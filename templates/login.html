{% extends 'base.html' %}

{% block content %}

<div class="login-container">

    <form class="login-form"
    method="POST"
    action="/login">

        <h2>Login</h2>

        <input type="email"
        name="email"
        placeholder="Enter Email"
        required>

        <input type="password"
        name="password"
        placeholder="Enter Password"
        required>

        <button class="btn">
            Login
        </button>

        <br><br>

        <p style="text-align:center;">

            Don't have an account?

            <a href="/register"
            style="color:#38bdf8;">
                Register
            </a>

        </p>

    </form>

</div>

{% endblock %}
