{% extends 'base.html' %}

{% block content %}

<section class="products">

    <h2>

        Search Results for "{{ query }}"

    </h2>

    <div class="product-grid">

        {% for product in products %}

        <div class="product-card">

            <img src="{{ product.image }}"
            alt="">

            <div class="product-info">

                <h3>

                    {{ product.name }}

                </h3>

                <p>

                    {{ product.description }}

                </p>

                <div class="price">

                    ₹{{ product.price }}

                </div>

                <br>

                <a href="/add-to-cart/{{ product.id }}">

                    <button class="btn">

                        Add to Cart

                    </button>

                </a>

            </div>

        </div>

        {% endfor %}

    </div>

</section>

{% endblock %}
