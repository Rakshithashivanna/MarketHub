<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/admin.css') }}">

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>


<!-- SIDEBAR -->

<div class="sidebar">

    <h2>MarketHub</h2>

    <ul>

        <li>
            <a href="/admin">
                <i class="fa fa-home"></i>
                Dashboard
            </a>
        </li>

        <li>
            <a href="/add-product">
                <i class="fa fa-plus"></i>
                Add Product
            </a>
        </li>

        <li>
            <a href="admin-orders">
                <i class="fa fa-box"></i>
                Orders
            </a>
        </li>

        <li>
            <a href="manage-users">
                <i class="fa fa-users"></i>
                Users
            </a>
        </li>

        <li>
    <a href="/manage-reviews">
        <i class="fa fa-star"></i>
        Reviews
    </a>
</li>

        <li>
            <a href="/logout">
                <i class="fa fa-sign-out"></i>
                Logout
            </a>
        </li>

    </ul>

</div>



<!-- MAIN CONTENT -->

<div class="main-content">

    {% block content %}

    {% endblock %}

</div>

</body>
</html>
