{% extends 'base.html' %}

{% block content %}

<div class="login-container">

    <form class="login-form"
    method="POST">

        <h2>Add Product</h2>

        <!-- PRODUCT NAME -->

        <input type="text"
        name="name"
        placeholder="Product Name"
        required>


        <!-- PRICE -->

        <input type="text"
        name="price"
        placeholder="Product Price"
        required>


        <!-- CATEGORY -->

        <select name="category" required>

            <option value="">
                Select Category
            </option>

            <option value="Fashion">
                Fashion
            </option>

            <option value="Shoes">
                Shoes
            </option>

            <option value="Mobile">
                Mobile
            </option>

            <option value="Laptop">
                Laptop
            </option>

            <option value="Watch">
                Watch
            </option>

            <option value="Headphone">
                Headphone
            </option>

        </select>


        <!-- GENDER -->

        <select name="gender" required>

            <option value="">
                Select Gender
            </option>

            <option value="Men">
                Men
            </option>

            <option value="Women">
                Women
            </option>

            <option value="Unisex">
                Unisex
            </option>

        </select>


        <!-- SUBCATEGORY -->

        <select name="subcategory" required>

            <option value="">
                Select Subcategory
            </option>

            <!-- FASHION -->

            <option value="Shirts">
                Shirts
            </option>

            <option value="Jeans">
                Jeans
            </option>

            <option value="Tops">
                Tops
            </option>

            <option value="Sarees">
                Sarees
            </option>

            <option value="Kurti">
                Kurti
            </option>

            <!-- SHOES -->

            <option value="Sports Shoes">
                Sports Shoes
            </option>

            <option value="Sneakers">
                Sneakers
            </option>

            <option value="Formal Shoes">
                Formal Shoes
            </option>

            <!-- MOBILE -->

            <option value="Apple">
                Apple
            </option>

            <option value="Samsung">
                Samsung
            </option>

            <option value="OnePlus">
                OnePlus
            </option>

            <!-- LAPTOP -->

            <option value="HP">
                HP
            </option>

            <option value="Dell">
                Dell
            </option>

            <option value="Lenovo">
                Lenovo
            </option>

            <!-- WATCH -->

            <option value="Smart Watch">
                Smart Watch
            </option>

            <option value="Analog Watch">
                Analog Watch
            </option>

            <!-- HEADPHONE -->

            <option value="Wireless">
                Wireless
            </option>

            <option value="Wired">
                Wired
            </option>

        </select>


        <!-- IMAGE -->

        <input type="text"
        name="image"
        placeholder="Image URL"
        required>


        <!-- DESCRIPTION -->

        <textarea
        name="description"
        placeholder="Product Description"
        required
        style="width:100%;
        height:120px;
        padding:15px;
        border:none;
        border-radius:10px;
        margin-bottom:20px;"></textarea>


        <!-- BUTTON -->

        <button class="btn">

            Add Product

        </button>

    </form>

</div>

{% endblock %}
